<body class="closed zipidle">

  <script>
    let loaded = {};
    
    function alertError (context, e) {
        let summary = `Error ${context}: ${e.message}`;
        console.log(`harextract: ${summary}`, e);
        alert(`${summary}\n\nCheck console for details.`);
    }
    
    function uiSetDocState (isopen) {
        document.body.classList.remove(isopen ? 'closed' : 'open');
        document.body.classList.add(isopen ? 'open' : 'closed');
    }
    
    function uiSetZipState (isbusy) {
        document.body.classList.remove(isbusy ? 'zipidle' : 'zipbusy');
        document.body.classList.add(isbusy ? 'zipbusy' : 'zipidle');
    }
    
    function clearUI () {
        loaded = {};
        uiSetDocState(false);
        uiSetZipState(false);
        document.querySelectorAll(".clearme").forEach((el) => el.innerHTML = '');
        const fill = document.getElementById('progressFill');
        if(fill) fill.style.width = '0%';
        document.getElementById('zipprogress').innerText = '0';
    }
    
    function strCompare (a, b) {
        return a.toLocaleLowerCase().localeCompare(b.toLocaleLowerCase());
    }
    
    function formatFileSize(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        const size = (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1);
        return `${size} ${sizes[i]}`;
    }
    
    function loadFailed (e) {
        clearUI();
        alertError('loading file', e);
    }
    
    function openHAR (input) {
        clearUI();
        if (!input.files || !input.files.length) {
            alert('No file selected.');
        } else {
            loaded.filename = input.files[0].name;
            domSetText('harfilename', loaded.filename);
            let reader = new FileReader();
            reader.onload = (e) => loadHARText(e.target.result);
            reader.onerror = (e) => loadFailed(reader.error);
            reader.readAsText(input.files[0]);
        }
    }
    
    function loadHARText (text) {
        try {
            loadHARJSON(JSON.parse(text));
        } catch (e) {
            loadFailed(e);
        }
    }
    
    function loadHARJSON (har) {
        let harents = [];
        let skipped = [];
        let commonpath = null;
        
        if (!har || !har.log || !har.log.entries) {
            loadFailed(new Error('Invalid HAR file structure'));
            return;
        }
        
        console.log(`harextract: Processing ${har.log.entries.length} entries...`);
        
        for (let [id, ent] of har.log.entries.entries()) {
            let harent = { id: id };
            
            try {
                var fullpath = decodeURIComponent(new URL(ent.request.url).pathname).split('/');
            } catch (e) {
                var fullpath = ent.request.url.split(/[\/\\]/).filter(p => p);
                if (fullpath.length === 0) fullpath = ['unknown'];
                console.warn(`harextract: URL parse fallback for entry ${id}`);
            }
            
            harent.name = fullpath.pop() || 'unnamed';
            harent.type = ent.response.content.mimeType || 'application/octet-stream'; 
            harent.size = ent.response.content.size || (ent.response.content.text ? ent.response.content.text.length : 0);
            harent.pathcomps = fullpath;
            
            // Original content check - only include if content actually exists
            if (!ent.response || !ent.response.content || ent.response.content.text === undefined) {
                harent.error = 'No content available';
            } else if (!!ent.response.content.encoding && ent.response.content.encoding !== 'base64') {
                harent.error = `Unsupported encoding: ${ent.response.content.encoding}`;
            }
            
            if (harent.error) {
                console.log(`harextract: skipped ${harent.name} (${id}): ${harent.error}`);
                skipped.push(harent);
            } else {
                if (commonpath === null) {
                    commonpath = fullpath;
                } else {
                    commonpath = fullpath.slice(0, [...fullpath, null].findIndex((p, n) => p !== (commonpath || fullpath)[n]));
                }
                harents.push(harent);
            }
        }
        
        harents.forEach(ent => {
            ent.path = ent.pathcomps.slice(commonpath ? commonpath.length : 0).join('/');
        });
        skipped.forEach(ent => ent.path = ent.pathcomps.join('/'));
        
        let entsort = function (a, b) {
            let p = strCompare(a.path, b.path);
            return (p != 0) ? p : strCompare(a.name, b.name);
        };
        harents.sort(entsort);
        skipped.sort(entsort);
        
        loaded.data = har.log.entries;
        loaded.entries = harents;
        loaded.skipped = skipped;

        domSetText('fileinfo_fversion', har.log.version);
        domSetText('fileinfo_creator', har.log.creator.name);
        domSetText('fileinfo_cversion', har.log.creator.version);
        domSetText('fileinfo_npages', har.log.pages ? har.log.pages.length : 0);
        domSetText('fileinfo_nentries', har.log.entries.length);

        let makenamelink = function (ent) {
            let a = document.createElement("a");
            let enc = har.log.entries[ent.id].response.content.encoding;
            let data = har.log.entries[ent.id].response.content.text;
            
            if (data && data.length > 10 * 1024 * 1024) {
                a.href = '#';
                a.className = 'entry-link';
                a.style.color = 'var(--accent-yellow)';
                a.onclick = function(e) {
                    e.preventDefault();
                    alert(`"${ent.name}" is ${formatFileSize(data.length)} - too large for preview.\nUse the Download ZIP button to access this file.`);
                };
                a.title = 'Large file - download ZIP to access';
            } else {
                a.href = `data:${ent.type};${enc || ''},${data || ''}`;
                a.target = '_blank';
                a.download = ent.name;
                a.className = 'entry-link';
            }
            a.innerText = ent.name;
            return a;
        };
        
        let makeSizeTag = function (ent) {
            let span = document.createElement('span');
            span.className = 'size-tag';
            span.innerText = formatFileSize(ent.size);
            return span;
        };
        
        populateTable('entryinfo', harents, [
            { name: 'ID', value: (e) => e.id },
            { name: 'Filename', value: makenamelink },
            { name: 'Type', value: (e) => e.type },
            { name: 'Size', value: makeSizeTag },
            { name: 'Path', value: (e) => e.path || '/' }
        ]);
        
        populateTable('skippedinfo', skipped, [
            { name: 'ID', value: (e) => e.id },
            { name: 'Error', value: (e) => e.error },
            { name: 'Filename', value: (e) => e.name },
            { name: 'Type', value: (e) => e.type },
            { name: 'Size', value: (e) => formatFileSize(e.size) },
            { name: 'Path', value: (e) => e.path || '/' }
        ]);
        
        uiSetDocState(true);
        console.log(`harextract: ${harents.length} files loaded, ${skipped.length} skipped`);
    }

    function populateTable (tableid, items, fields) {
        let etable = document.getElementById(tableid);
        etable.innerHTML = '';
        
        if (items.length === 0) {
            let tbody = etable.createTBody();
            let row = tbody.insertRow();
            let cell = row.insertCell();
            cell.colSpan = fields.length;
            cell.style.textAlign = 'center';
            cell.style.color = 'var(--text-muted)';
            cell.style.padding = '2rem';
            cell.innerText = tableid === 'skippedinfo' ? 'No entries skipped' : 'No files extracted';
            return;
        }
        
        let header = etable.createTHead().insertRow();
        for (let field of fields) {
            let th = document.createElement('th');
            th.innerText = field.name;
            header.appendChild(th);
        }
        
        let ebody = etable.createTBody();
        for (let ent of items) {
            let erow = ebody.insertRow();
            for (let field of fields) {
                let value = field.value(ent);
                let cell = erow.insertCell();
                if (value instanceof Node) {
                    cell.appendChild(value);
                } else {
                    cell.innerText = value;
                }
            }
        }
    }
    
    function buildZIP (ents, data) {
        if (ents.length === 0) throw new Error('No files to save.');
        
        console.log(`harextract: Building ZIP with ${ents.length} files...`);
        let zip = new JSZip();
        let added = 0;
        
        for (let ent of ents) {
            try {
                let filepath = `${ent.path}/${ent.name}`.replace(/^\/+/, '');
                let encoding = data[ent.id].response.content.encoding;
                let content = data[ent.id].response.content.text;
                
                if (!content) continue;
                if (!!encoding && encoding !== 'base64') continue;
                
                zip.file(filepath, content, { base64: !!encoding });
                added++;
            } catch (e) {
                console.error(`harextract: Failed to add ${ent.name}:`, e);
            }
        }
        
        console.log(`harextract: ${added} files added to ZIP`);
        if (added === 0) throw new Error('No files could be added to the ZIP archive.');
        
        return zip;
    }
    
    function showZipProgress (m) {
        domSetText('zipprogress', m.percent.toFixed(0));
        const fill = document.getElementById('progressFill');
        if(fill) fill.style.width = m.percent.toFixed(0) + '%';
    }
    
    async function saveZIP () {
        try {
            if (!loaded.entries || loaded.entries.length === 0) {
                throw new Error('No files to save.');
            }
            
            uiSetZipState(true);
            
            if (!loaded.zip) {
                loaded.zip = buildZIP(loaded.entries, loaded.data);
            }
            
            let comp = parseInt(document.getElementById('compression').value);
            
            const zipblob = await loaded.zip.generateAsync({
                type: 'blob',
                compression: (comp > 0 ? 'DEFLATE' : 'STORE'),
                compressionOptions: { level: comp }
            }, showZipProgress);
            
            let zipurl = URL.createObjectURL(zipblob);
            let a = document.createElement('a');
            a.href = zipurl;
            a.download = `${loaded.filename.replace(/\.har$/i, '')}.zip`;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(zipurl);
            }, 100);
            
        } catch (e) {
            alertError('saving ZIP', e);
        } finally {
            uiSetZipState(false);
        }
    }
    
    function doUpdateCheck () {
        try {
            fetch('https://api.github.com/repos/JC3/harextract/releases/latest')
                .then(r => r.ok ? r.json() : Promise.reject(new Error(`${r.status} ${r.statusText}`)))
                .then(handleUpdateCheck)
                .catch(e => console.log(`harextract: Update check failed: ${e.message}`));
        } catch (e) {
            console.log(`harextract: Update check failed: ${e.message}`);
        }
    }
    
    function handleUpdateCheck (info) {
        if (info.draft === false && info.prerelease === false && info.html_url) {
            let makever = v => v.match(/[^.0-9]*([.0-9]+)/)[1].split('.').map(s => parseInt(s));
            if (makever(info.tag_name) > makever(HAREXTRACT_VERSION)) {
                document.body.classList.add('newrelease');
                document.getElementById('updatelink').href = info.html_url;
                document.getElementById('updatelink').title = `New Version: ${info.name}`;
            }
        }
    }
    
    function domSetText (id, text) {
        let el = document.getElementById(id);
        if(el) el.innerText = text;
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('version').innerText = HAREXTRACT_VERSION;
        document.getElementById('version-footer').innerText = HAREXTRACT_VERSION;
        doUpdateCheck();
    });
  </script>
  <script src="jszip.min.js"></script>
</body>
</html>
